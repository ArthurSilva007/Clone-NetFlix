<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clone da interface da Netflix para estudos de front-end">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
  <header>
    <p class="netflix-logo" aria-label="Netflix">NETFLIX</p>
    <h1>Quem está assistindo?</h1>
  </header>
  <main>
    <nav aria-label="Seleção de perfis">
      <ul class="profiles">
        <li>
          <a href="catalogo/catalogo.html" class="profile" aria-label="Entrar como Gustavo">
            <figure>
              <img src="./assets/movie%20board.jpg" alt="Avatar do perfil Gustavo">
              <figcaption>Gustavo</figcaption>
            </figure>
          </a>
        </li>
        <li>
          <a href="catalogo/catalogo.html" class="profile" aria-label="Entrar como Bianca">
            <figure>
              <img src="./assets/profile%20netflix.jpg" alt="Avatar do perfil Bianca">
              <figcaption>Bianca</figcaption>
            </figure>
          </a>
        </li>
        <li>
          <a href="catalogo/catalogo.html" class="profile" aria-label="Entrar como Arthur">
            <figure>
              <img src="./assets/transferir%20%281%29.jpg" alt="Avatar do perfil Arthur">
              <figcaption>Arthur</figcaption>
            </figure>
          </a>
        </li>
        <li>
          <a href="catalogo/catalogo.html" class="profile" aria-label="Entrar como Souza">
            <figure>
              <img src="./assets/transferir.jpg" alt="Avatar do perfil Souza">
              <figcaption>Souza</figcaption>
            </figure>
          </a>
        </li>
      </ul>
    </nav>
  </main>
  <script src="./js/index.js"></script>
</body>
</html>
